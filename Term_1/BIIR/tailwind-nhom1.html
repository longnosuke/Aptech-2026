<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS Slideshow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: [
                "JetBrains Mono",
                "SFMono-Regular",
                "Consolas",
                "monospace",
              ],
            },
            boxShadow: {
              slide: "0 24px 80px rgba(15, 23, 42, 0.16)",
              soft: "0 10px 30px rgba(15, 23, 42, 0.10)",
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap");

      :root {
        color-scheme: light;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(14, 165, 233, 0.16),
            transparent 30rem
          ),
          linear-gradient(135deg, #f8fafc 0%, #eef6ff 45%, #f8fafc 100%);
        overflow: hidden;
      }

      .noise {
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.9),
          transparent 85%
        );
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      code {
        font-variant-ligatures: none;
      }

      .code-token-tag {
        color: #7dd3fc;
      }

      .code-token-attr {
        color: #fbbf24;
      }

      .code-token-string {
        color: #86efac;
      }

      .code-token-keyword {
        color: #c4b5fd;
      }

      .code-token-comment {
        color: #94a3b8;
        font-style: italic;
      }

      .code-token-number {
        color: #fca5a5;
      }

      button:focus-visible,
      input:focus-visible,
      .codePreviewBtn:focus-visible,
      .appendixSlideBtn:focus-visible {
        outline: 3px solid rgba(14, 165, 233, 0.45);
        outline-offset: 3px;
      }

      .appendixOverlay {
        opacity: 0;
        transition: opacity 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .appendixOverlay.appendix-open {
        opacity: 1;
      }

      .appendixPanel {
        transform: translateY(12px) scale(0.98);
        transition:
          transform 180ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 180ms cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 0;
      }

      .appendixOverlay.appendix-open .appendixPanel {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    </style>
  </head>
  <body class="font-sans text-slate-950">
    <div class="noise pointer-events-none fixed inset-0"></div>

    <main
      class="relative flex min-h-screen items-center justify-center px-4 py-5 sm:px-6 lg:px-8"
    >
      <section
        id="slideCard"
        class="grid h-[min(760px,calc(100vh-40px))] w-full max-w-6xl grid-rows-[auto_1fr_auto] rounded-[2rem] border border-white/80 bg-white/78 p-5 shadow-slide backdrop-blur-xl sm:p-7 lg:p-9"
        aria-live="polite"
      >
        <div class="flex items-center justify-between gap-4">
          <div>
            <p
              id="kicker"
              class="text-sm font-bold uppercase tracking-[0.18em] text-sky-700"
            ></p>
            <p id="count" class="mt-1 text-base font-bold text-slate-500">
              1 / 15
            </p>
          </div>
          <button
            id="appendixBtn"
            class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 shadow-soft transition hover:-translate-y-0.5 hover:border-sky-200 hover:text-sky-700 active:translate-y-0"
            type="button"
          >
            Phụ lục
          </button>
        </div>

        <div
          class="grid min-h-0 grid-cols-1 content-center gap-5 py-4 lg:grid-cols-[1.05fr_0.95fr] lg:gap-8 lg:py-5"
        >
          <div class="min-w-0">
            <h1
              id="title"
              class="text-balance text-4xl font-extrabold leading-[1.05] tracking-normal text-slate-950 sm:text-5xl lg:text-6xl"
            >
              Tailwind CSS là gì?
            </h1>
            <p
              id="lead"
              class="mt-5 max-w-3xl text-pretty text-xl font-semibold leading-8 text-slate-650 sm:text-2xl sm:leading-9"
            >
              Framework CSS utility-first giúp build UI nhanh bằng class nhỏ, rõ
              ý nghĩa, nằm trực tiếp trong markup.
            </p>
            <ul
              id="bullets"
              class="mt-6 grid gap-2.5 text-lg font-semibold leading-7 text-slate-700 sm:text-xl"
            ></ul>
          </div>

          <div class="grid min-h-0 content-center gap-3">
            <div
              id="visual"
              class="rounded-[1.75rem] border border-slate-200 bg-slate-50 p-4 shadow-soft"
            ></div>
            <div
              id="codeWrap"
              class="hidden min-w-0 overflow-hidden rounded-[1.75rem] border border-slate-800 bg-slate-950 shadow-soft"
            >
              <div
                class="flex items-center justify-between gap-3 border-b border-white/10 px-5 py-4"
              >
                <div class="flex gap-2">
                  <span class="h-3 w-3 rounded-full bg-red-400"></span>
                  <span class="h-3 w-3 rounded-full bg-yellow-300"></span>
                  <span class="h-3 w-3 rounded-full bg-emerald-400"></span>
                </div>
                <div class="flex items-center gap-3">
                  <span
                    id="codeLabel"
                    class="text-xs font-bold uppercase tracking-[0.16em] text-slate-400"
                    >Example</span
                  >
                  <button
                    id="openCodeBtn"
                    class="rounded-full bg-white/10 px-3 py-1.5 text-xs font-extrabold text-white transition hover:bg-white/20"
                    type="button"
                  >
                    Mở lớn
                  </button>
                </div>
              </div>
              <div
                id="codeTabs"
                class="hidden flex-wrap gap-2 border-b border-white/10 px-4 py-3"
              ></div>
              <div
                id="codePreviewBtn"
                class="codePreviewBtn block w-full cursor-zoom-in text-left"
                role="button"
                tabindex="0"
                aria-label="Mở code example lớn"
              >
                <pre
                  class="max-h-[190px] overflow-y-auto overflow-x-hidden p-5 text-[15px] font-semibold leading-8 text-slate-100 sm:text-[16px] lg:max-h-[190px] lg:text-[17px]"
                ><code id="code"></code></pre>
              </div>
            </div>
          </div>
        </div>

        <div class="grid gap-4">
          <div class="flex items-center justify-between gap-4">
            <button
              id="prevBtn"
              class="rounded-2xl border border-slate-200 bg-white px-5 py-3 text-base font-extrabold text-slate-700 shadow-soft transition hover:-translate-y-0.5 hover:border-slate-300 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:translate-y-0"
              type="button"
            >
              Previous
            </button>
            <button
              id="nextBtn"
              class="rounded-2xl bg-slate-950 px-6 py-3 text-base font-extrabold text-white shadow-soft transition hover:-translate-y-0.5 hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:translate-y-0"
              type="button"
            >
              Next
            </button>
          </div>
        </div>
      </section>
    </main>

    <div
      id="codeLightbox"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4 backdrop-blur-sm"
      role="dialog"
      aria-modal="true"
      aria-labelledby="lightboxTitle"
    >
      <div
        class="grid max-h-[92vh] w-full max-w-6xl grid-rows-[auto_1fr] overflow-hidden rounded-[2rem] border border-white/15 bg-slate-950 shadow-slide"
      >
        <div
          class="flex items-center justify-between gap-4 border-b border-white/10 px-5 py-4"
        >
          <div class="min-w-0">
            <p
              class="text-xs font-extrabold uppercase tracking-[0.18em] text-sky-300"
            >
              Code example
            </p>
            <h2
              id="lightboxTitle"
              class="mt-1 truncate text-xl font-extrabold text-white"
            >
              Example
            </h2>
          </div>
          <div class="flex shrink-0 items-center gap-2">
            <button
              id="lightboxCopyBtn"
              class="rounded-full bg-white px-4 py-2 text-sm font-extrabold text-slate-950 transition hover:bg-sky-100"
              type="button"
            >
              Copy
            </button>
            <button
              id="closeLightboxBtn"
              class="rounded-full bg-white/10 px-4 py-2 text-sm font-extrabold text-white transition hover:bg-white/20"
              type="button"
            >
              Đóng
            </button>
          </div>
        </div>
        <pre
          class="min-h-0 overflow-auto p-5 text-[16px] font-semibold leading-8 text-slate-100 sm:p-7 sm:text-[18px] lg:text-[20px]"
        ><code id="lightboxCode"></code></pre>
      </div>
    </div>

    <div
      id="appendixModal"
      class="appendixOverlay fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/55 p-4 backdrop-blur-sm"
      role="dialog"
      aria-modal="true"
      aria-labelledby="appendixTitle"
    >
      <div
        class="appendixPanel grid max-h-[88vh] w-full max-w-4xl grid-rows-[auto_auto_1fr] overflow-hidden rounded-[2rem] border border-white/80 bg-white/95 shadow-slide"
      >
        <div
          class="flex items-start justify-between gap-4 border-b border-slate-200 px-5 py-5 sm:px-6"
        >
          <div class="min-w-0">
            <p
              class="text-xs font-extrabold uppercase tracking-[0.18em] text-sky-700"
            >
              Phụ lục
            </p>
            <h2
              id="appendixTitle"
              class="mt-1 text-2xl font-extrabold tracking-normal text-slate-950"
            >
              Chọn slide
            </h2>
          </div>
          <button
            id="closeAppendixBtn"
            class="rounded-full bg-slate-950 px-4 py-2 text-sm font-extrabold text-white transition hover:bg-sky-700"
            type="button"
          >
            Đóng
          </button>
        </div>
        <div class="border-b border-slate-200 bg-slate-50/80 px-5 py-4 sm:px-6">
          <label
            class="block text-xs font-extrabold uppercase tracking-[0.16em] text-slate-500"
            for="appendixSearch"
            >Tìm slide</label
          >
          <input
            id="appendixSearch"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold text-slate-800 shadow-soft outline-none transition placeholder:text-slate-400 focus:border-sky-300"
            type="search"
            placeholder="Nhập tên slide hoặc số thứ tự..."
            autocomplete="off"
          />
        </div>
        <div
          id="appendixList"
          class="min-h-0 overflow-y-auto p-4 sm:p-5"
        ></div>
      </div>
    </div>

    <script>
      const slides = [
        {
          title: "Tailwind CSS là gì?",

          bullets: [
            "Không cần đặt tên class cho mọi thứ",
            "Style nằm gần HTML nên dễ đọc context",
            "Sinh CSS cuối cùng nhỏ khi build production",
          ],
          visual: "utility",
        },
        {
          title: "Utility-first nghĩa là gì?",
          lead: "Thay vì viết class riêng rồi vào file CSS, ta ghép nhiều utility nhỏ để tạo giao diện.",
          bullets: [
            "p-4 là padding",
            "rounded-xl là bo góc",
            "text-slate-900 là màu chữ",
            "hover:bg-sky-700 là trạng thái hover",
          ],
          codeLabel: "HTML",
          code: `<button class="rounded-xl bg-sky-600 px-5 py-3 font-bold text-white hover:bg-sky-700">

</button>`,
          visual: "button",
        },
        {
          title: "Nhóm class cơ bản cần nhớ",
          lead: "Không cần học hết Tailwind ngay. Nắm vài nhóm class là đã build được đa số UI thường gặp.",
          bullets: [
            "Spacing: m, p, gap, space-y",
            "Layout: flex, grid, items-center, justify-between",
            "Size: w, h, min-h, max-w",
            "Typography: text, font, leading",
            "Color/state: bg, text, border, hover, focus",
          ],
          codeLabel: "Class groups",
          code: `<div class="max-w-xl rounded-2xl border bg-white p-6 shadow-sm">

          visual: "classGroups",
        },
        {

          ],
          codeLabel: "Spacing",
          code: `<div class="space-y-3 rounded-2xl bg-white p-6">

        {

            "max-w-* giúp nội dung dễ đọc",
          ],
          codeLabel: "Layout",
          code: `<div class="grid gap-4 md:grid-cols-3">

  <article class="rounded-2xl border bg-white p-5">Card 2</article>
  <article class="rounded-2xl border bg-white p-5">Card 3</article>
</div>`,
          visual: "layout",
        },
        {
          title: "Typography: chữ dễ đọc",
          lead: "Khi thuyết trình hoặc làm dashboard, typography quyết định UI có đọc được hay không.",
          bullets: [
            "text-sm, text-lg, text-3xl: cỡ chữ",
            "font-semibold, font-bold, font-extrabold: độ đậm",

            "text-balance / max-w giúp headline đẹp hơn",
          ],
          codeLabel: "Typography",
          code: `<section class="max-w-2xl">
  <p class="text-sm font-bold uppercase tracking-widest text-sky-700">Dashboard</p>
  <h1 class="mt-3 text-4xl font-extrabold leading-tight">
    Doanh thu theo thời gian thực
  </h1>
  <p class="mt-4 text-lg leading-8 text-slate-600">
    Theo dõi biến động theo ngày, khu vực và kênh bán.
  </p>
</section>`,
          visual: "typeScale",
        },
        {
          title: "State: hover, focus, disabled",
          lead: "Class state giúp UI có cảm giác thật, không chỉ là ảnh tĩnh.",
          bullets: [
            "hover:* cho mouse",
            "focus-visible:* cho keyboard",
            "disabled:* cho trạng thái không thể bấm",
            "aria-* dùng tốt với accessibility state",
          ],
          codeLabel: "Button states",
          code: `<div class="grid gap-3">
  <button class="rounded-xl bg-slate-950 px-5 py-3 font-bold text-white">

  </button>

  </button>

    Disabled
  </button>
</div>`,
          visual: "states",
        },
        {
          title: "Tại sao Tailwind tồn tại?",

            "Không phải nhảy liên tục giữa HTML và CSS",
            "Giảm CSS chết sau nhiều lần đổi UI",

          visual: "tokens",
        },
        {

          lead: "Ba vấn đề đầu thường xuất hiện khi CSS bắt đầu lớn: naming, bloat và global scope.",
          bullets: [
            "Đặt tên class khó khăn: phải nghĩ tên như .card-header_title--small, tốn thời gian và dễ trùng trong dự án lớn.",

          code: `.card-header_title--small {

}

          visual: "warning",
        },
        {

          bullets: [
            "Context switching: dev phải nhảy qua lại giữa HTML/JSX và file .css hoặc .scss để chỉnh giao diện.",
            "Tính nhất quán dễ vỡ: cùng là spacing nhưng nơi dùng 10px, nơi dùng 12px, nơi dùng 16px.",
            "Prototype xong thành production luôn, nên CSS tạm thời sống lâu hơn dự kiến.",
            "Button, input, modal mỗi nơi một biến thể; sửa global CSS một chỗ có thể vỡ nhiều màn hình.",
          ],
          codeLabel: "Reality",
          code: `<!-- ProductCard.jsx -->

}

          visual: "devPain",
        },
        {
          title: "CSS truyền thống vs Tailwind",
          lead: "Khác biệt chính nằm ở nơi ta mô tả style: file CSS riêng hay ngay trong markup.",
          bullets: [
            "CSS thường: semantic class + stylesheet",
            "Tailwind: utility class + design system",
            "Cả hai đều dùng được production nếu có convention tốt",
          ],
          visual: "compare",
        },
        {
          title: "Button bằng CSS thường",

            "Dễ đọc tên component",

            "Cần quản lý naming và scope",
          ],
          visual: "cssButton",
        },
        {
          title: "Button bằng Tailwind",
          lead: "Style nằm ngay trên element. Rất nhanh khi cần chỉnh spacing, màu, hover, responsive.",

          code: `<button
  class="rounded-xl bg-sky-600 px-5 py-3 font-bold text-white"
>
  Thanh toán
</button>`,
          bullets: [
            "Không viết CSS mới",
            "Không cần nghĩ tên class",
            "State và responsive nằm cùng chỗ",
          ],
          visual: "button",
        },
        {
          title: "Vì sao Tailwind phổ biến?",
          lead: "Vì nó khớp rất tự nhiên với React: UI được chia thành component nhỏ, mỗi component tự giữ layout, state và responsive style.",

            "Tailwind giúp style nằm cùng markup nên review nhanh",

          codeLabel: "React product code",
          code: `function ProductCard({ product, selected, onSelect }) {

    <article
      className={
        "rounded-2xl border bg-white p-5 shadow-sm transition " +
        (selected

      function getCodeExamples(slide) {
        if (slide.codeExamples?.length) return slide.codeExamples;

      function getCurrentCodeExample() {

        return examples[state.codeExampleIndex] || examples[0];

      function renderCodeTabs(examples) {
        if (examples.length <= 1) {
          el.codeTabs.classList.add("hidden");
          el.codeTabs.classList.remove("flex");
          el.codeTabs.innerHTML = "";
          return;

        el.codeTabs.classList.remove("hidden");
        el.codeTabs.classList.add("flex");
        el.codeTabs.innerHTML = examples

          data-code-tab="${index}"

      function normalizeText(value) {
        return value
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function renderAppendixList() {
        const query = normalizeText(state.appendixQuery.trim());
        const filteredSlides = slides
          .map((slide, index) => ({ slide, index }))
          .filter(({ slide, index }) => {
            if (!query) return true;
            const haystack = normalizeText(
              `${index + 1} ${slide.title} ${slide.lead}`,

            return haystack.includes(query);
          });

        if (!filteredSlides.length) {
          el.appendixList.innerHTML = `

        el.appendixList.innerHTML = filteredSlides
          .map(({ slide, index }) => {
            const active = index === state.index;
            return `
        <button
          class="appendixSlideBtn group mb-2 grid w-full grid-cols-[auto_1fr_auto] items-start gap-4 rounded-2xl border px-4 py-3 text-left transition ${active ? "border-sky-300 bg-sky-50 shadow-soft" : "border-slate-200 bg-white hover:-translate-y-0.5 hover:border-sky-200 hover:shadow-soft"}"

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function highlightCode(rawCode) {
        let html = escapeHtml(rawCode);
        const tokens = [];
        const tokenName = (index) => {
          let name = "";
          let value = index;
          do {
            name = String.fromCharCode(65 + (value % 26)) + name;
            value = Math.floor(value / 26) - 1;
          } while (value >= 0);
          return `@@CODETOKEN_${name}@@`;
        };
        const storeToken = (type, value) => {
          const key = tokenName(tokens.length);
          tokens.push({ key, type, value });
          return key;
        };

        html = html.replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, (match) =>
          storeToken("comment", match),
        );
        html = html.replace(/(".*?"|'.*?'|`.*?`)/g, (match) =>
          storeToken("string", match),
        );
        html = html.replace(
          /\b(const|let|var|function|return|import|from|export|default|module|theme|extend|colors|borderRadius)\b/g,
          (match) => storeToken("keyword", match),
        );
        html = html.replace(/\b(\d+(?:\.\d+)?)(px|rem|%|vh|vw)?\b/g, (match) =>
          storeToken("number", match),
        );
        html = html.replace(
          /\s([a-zA-Z_:][-a-zA-Z0-9_:.]*)(=)/g,
          ' <span class="code-token-attr">$1</span>$2',
        );
        html = html.replace(
          /(&lt;\/?)([a-zA-Z][\w:-]*)/g,
          '$1<span class="code-token-tag">$2</span>',
        );

        tokens.forEach(({ key, type, value }) => {
          html = html.replaceAll(
            key,
            `<span class="code-token-${type}">${value}</span>`,
          );
        });

        return html;
      }

      function initAiCostCalculator() {
        const slider = el.visual.querySelector("[data-ai-slider]");
        if (!slider) return;

        const refs = {
          level: el.visual.querySelector("[data-ai-level]"),
          saved: el.visual.querySelector("[data-ai-saved]"),
          cssCost: el.visual.querySelector("[data-ai-css-cost]"),
          tailwindCost: el.visual.querySelector("[data-ai-tailwind-cost]"),
          cssBar: el.visual.querySelector("[data-ai-css-bar]"),
          tailwindBar: el.visual.querySelector("[data-ai-tailwind-bar]"),
          cssContext: el.visual.querySelector("[data-ai-css-context]"),
          tailwindContext: el.visual.querySelector(
            "[data-ai-tailwind-context]",
          ),
        };

        const update = () => {
          const level = Number(slider.value);
          const cssCost = 18 + level * 12;
          const tailwindCost = 10 + level * 7;
          const saved = Math.round((1 - tailwindCost / cssCost) * 100);
          const cssContext = Math.max(42, 78 - level * 3);
          const tailwindContext = Math.min(96, 70 + level * 2);

          refs.level.textContent = level;
          refs.saved.textContent = `${saved}%`;
          refs.cssCost.textContent = `${cssCost} cost units`;
          refs.tailwindCost.textContent = `${tailwindCost} cost units`;
          refs.cssBar.style.width = "100%";
          refs.tailwindBar.style.width = `${Math.round((tailwindCost / cssCost) * 100)}%`;
          refs.cssContext.textContent = `${cssContext}%`;
          refs.tailwindContext.textContent = `${tailwindContext}%`;
        };

        slider.addEventListener("input", update);
        update();
      }

      function renderSlide() {
        const slide = slides[state.index];
        el.kicker.textContent = slide.category || "Tailwind CSS";
        el.count.textContent = `${state.index + 1} / ${slides.length}`;
        el.title.textContent = slide.title;
        el.lead.textContent = slide.lead;
        el.bullets.innerHTML = slide.bullets
          .map(
            (item) =>

          )
          .join("");
        el.visual.innerHTML = visualTemplate(slide.visual);
        initAiCostCalculator();
        el.prevBtn.disabled = state.index === 0;
        el.nextBtn.disabled = state.index === slides.length - 1;

        const examples = getCodeExamples(slide);
        const example = getCurrentCodeExample();
        renderCodeTabs(examples);

        if (example) {
          el.codeWrap.classList.remove("hidden");
          el.codeLabel.textContent =
            example.language || example.title || "Code";
          el.code.innerHTML = highlightCode(example.code);
        } else {
          el.codeWrap.classList.add("hidden");
          el.code.innerHTML = "";
        }

        renderDots();
        renderAppendixList();
      }

      function goTo(index) {

        el.lightbox.classList.remove("hidden");

        document.body.classList.add("overflow-hidden");

        }, 180);
      }

      async function copyCurrentCode(button) {
        const example = getCurrentCodeExample();
        if (!example) return;
        await navigator.clipboard.writeText(example.code);
        const oldText = button.textContent;
        button.textContent = "Copied";
        setTimeout(() => {
          button.textContent = oldText;
        }, 900);
      }

      el.prevBtn.addEventListener("click", () => goTo(state.index - 1));
      el.nextBtn.addEventListener("click", () => goTo(state.index + 1));
      el.codeTabs.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-code-tab]");
        if (!tab) return;
        state.codeExampleIndex = Number(tab.dataset.codeTab);
        renderSlide();
      });
      el.openCodeBtn.addEventListener("click", openLightbox);
      el.codePreviewBtn.addEventListener("click", openLightbox);
      el.codePreviewBtn.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        openLightbox();
      });
      el.closeLightboxBtn.addEventListener("click", closeLightbox);
      el.appendixBtn.addEventListener("click", openAppendix);
      el.closeAppendixBtn.addEventListener("click", () => closeAppendix());
      el.appendixSearch.addEventListener("input", (event) => {
        state.appendixQuery = event.target.value;
        renderAppendixList();
      });
      el.appendixList.addEventListener("click", (event) => {
        const item = event.target.closest("[data-appendix-slide]");
        if (!item) return;
        closeAppendix({ restoreFocus: false });
        goTo(Number(item.dataset.appendixSlide));
      });
      el.appendixModal.addEventListener("click", (event) => {
        if (event.target === el.appendixModal) closeAppendix();
      });
      el.lightboxCopyBtn.addEventListener("click", () =>
        copyCurrentCode(el.lightboxCopyBtn),
      );
      el.lightbox.addEventListener("click", (event) => {
        if (event.target === el.lightbox) closeLightbox();
      });

      window.addEventListener("keydown", (event) => {
        if (!el.appendixModal.classList.contains("hidden")) {
          if (event.key === "Escape") closeAppendix();
          return;
        }
        if (!el.lightbox.classList.contains("hidden")) {
          if (event.key === "Escape") closeLightbox();
          return;
        }
        if (event.key === "ArrowRight") goTo(state.index + 1);
        if (event.key === "ArrowLeft") goTo(state.index - 1);
      });

      renderSlide();
    </script>
  </body>
</html>
