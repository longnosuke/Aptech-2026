<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS Slideshow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: [
                "JetBrains Mono",
                "SFMono-Regular",
                "Consolas",
                "monospace",
              ],
            },
            boxShadow: {
              slide: "0 24px 80px rgba(15, 23, 42, 0.16)",
              soft: "0 10px 30px rgba(15, 23, 42, 0.10)",
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap");

      :root {
        color-scheme: light;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(14, 165, 233, 0.16),
            transparent 30rem
          ),
          linear-gradient(135deg, #f8fafc 0%, #eef6ff 45%, #f8fafc 100%);
        overflow: hidden;
      }

      .noise {
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.9),
          transparent 85%
        );
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      code {
        font-variant-ligatures: none;
      }

      .code-token-tag {
        color: #7dd3fc;
      }

      .code-token-attr {
        color: #fbbf24;
      }

      .code-token-string {
        color: #86efac;
      }

      .code-token-keyword {
        color: #c4b5fd;
      }

      .code-token-comment {
        color: #94a3b8;
        font-style: italic;
      }

      .code-token-number {
        color: #fca5a5;
      }

      button:focus-visible {
        outline: 3px solid rgba(14, 165, 233, 0.45);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body class="font-sans text-slate-950">
    <div class="noise pointer-events-none fixed inset-0"></div>

    <main

      <section

        aria-live="polite"
      >
        <div class="flex items-center justify-between gap-4">
          <div>
            <p
              id="kicker"
              class="text-sm font-bold uppercase tracking-[0.18em] text-sky-700"
            ></p>
            <p id="count" class="mt-1 text-base font-bold text-slate-500">
              1 / 15
            </p>
          </div>
          <button
            id="copyBtn"
            class="hidden rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 shadow-soft transition hover:-translate-y-0.5 hover:border-sky-200 hover:text-sky-700 active:translate-y-0"
            type="button"
          ></button>
        </div>

        <div
          class="grid min-h-0 grid-cols-1 content-center gap-5 py-5 lg:grid-cols-[1.05fr_0.95fr] lg:gap-8 lg:py-8"
        >
          <div class="min-w-0">
            <h1
              id="title"
              class="text-balance text-4xl font-extrabold leading-[1.05] tracking-normal text-slate-950 sm:text-5xl lg:text-6xl"
            >
              Tailwind CSS là gì?

            <p
              id="lead"
              class="mt-5 max-w-3xl text-pretty text-xl font-semibold leading-8 text-slate-650 sm:text-2xl sm:leading-9"

              ý nghĩa, nằm trực tiếp trong markup.

            <ul
              id="bullets"
              class="mt-7 grid gap-3 text-lg font-semibold leading-7 text-slate-700 sm:text-xl"

            <div

            ></div>
          </div>

          <div class="grid min-h-0 content-center gap-4">
            <div
              id="visual"
              class="rounded-3xl border border-slate-200 bg-slate-50 p-4 shadow-soft"
            ></div>
            <div
              id="codeWrap"
              class="hidden min-w-0 overflow-hidden rounded-3xl border border-slate-800 bg-slate-950 shadow-soft"
            >
              <div
                class="flex items-center justify-between gap-3 border-b border-white/10 px-4 py-3"
              >
                <div class="flex gap-1.5">
                  <span class="h-3 w-3 rounded-full bg-red-400"></span>
                  <span class="h-3 w-3 rounded-full bg-yellow-300"></span>
                  <span class="h-3 w-3 rounded-full bg-emerald-400"></span>
                </div>
                <div class="flex items-center gap-3">
                  <span
                    id="codeLabel"
                    class="text-xs font-bold uppercase tracking-[0.16em] text-slate-400"
                    >Example</span
                  >
                  <button
                    id="openCodeBtn"
                    class="rounded-full bg-white/10 px-3 py-1.5 text-xs font-extrabold text-white transition hover:bg-white/20"
                    type="button"
                  >
                    Mở lớn
                  </button>
                </div>
              </div>
              <div
                id="codeTabs"
                class="hidden flex-wrap gap-2 border-b border-white/10 px-4 py-3"
              ></div>
              <button
                id="codePreviewBtn"
                class="block w-full cursor-zoom-in text-left"
                type="button"
                aria-label="Mở code example lớn"
              >
                <pre
                  class="max-h-[300px] overflow-y-auto overflow-x-hidden p-4 text-[14px] font-semibold leading-7 text-slate-100 sm:text-[15px] lg:max-h-[360px]"

              </button>
            </div>
          </div>
        </div>

        <div class="grid gap-4">
          <div class="flex items-center justify-between gap-4">
            <button
              id="prevBtn"
              class="rounded-2xl border border-slate-200 bg-white px-5 py-3 text-base font-extrabold text-slate-700 shadow-soft transition hover:-translate-y-0.5 hover:border-slate-300 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:translate-y-0"

            <button

              class="rounded-2xl bg-slate-950 px-6 py-3 text-base font-extrabold text-white shadow-soft transition hover:-translate-y-0.5 hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:translate-y-0"
              type="button"
            >
              Next
            </button>
          </div>
        </div>
      </section>
    </main>

    <div
      id="codeLightbox"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4 backdrop-blur-sm"
      role="dialog"
      aria-modal="true"
      aria-labelledby="lightboxTitle"
    >

      >
        <div
          class="flex items-center justify-between gap-4 border-b border-white/10 px-5 py-4"
        >
          <div class="min-w-0">
            <p
              class="text-xs font-extrabold uppercase tracking-[0.18em] text-sky-300"
            >
              Code example
            </p>
            <h2
              id="lightboxTitle"
              class="mt-1 truncate text-xl font-extrabold text-white"
            >
              Example
            </h2>
          </div>
          <div class="flex shrink-0 items-center gap-2">
            <button
              id="lightboxCopyBtn"
              class="rounded-full bg-white px-4 py-2 text-sm font-extrabold text-slate-950 transition hover:bg-sky-100"
              type="button"
            >
              Copy
            </button>
            <button
              id="closeLightboxBtn"
              class="rounded-full bg-white/10 px-4 py-2 text-sm font-extrabold text-white transition hover:bg-white/20"
              type="button"
            >
              Đóng
            </button>
          </div>

          class="min-h-0 overflow-auto p-5 text-[16px] font-semibold leading-8 text-slate-100 sm:p-7 sm:text-[18px] lg:text-[20px]"
        ><code id="lightboxCode"></code></pre>
      </div>
    </div>

      function renderDots() {
        el.dots.innerHTML = slides
          .map(
            (_, i) =>
              `<button class="h-2.5 rounded-full transition ${i === state.index ? "w-8 bg-sky-600" : "w-2.5 bg-slate-300 hover:bg-slate-400"}" type="button" aria-label="Đi tới slide ${i + 1}" data-dot="${i}"></button>`,
          )
          .join("");
      }

      function getCodeExamples(slide) {
        if (slide.codeExamples?.length) return slide.codeExamples;
        if (!slide.code) return [];
        return [
          {
            title: slide.codeLabel || "Example",
            language: slide.codeLabel || "code",
            code: slide.code,
          },
        ];
      }

      function getCurrentCodeExample() {
        const examples = getCodeExamples(slides[state.index]);
        return examples[state.codeExampleIndex] || examples[0];
      }

      function renderCodeTabs(examples) {
        if (examples.length <= 1) {
          el.codeTabs.classList.add("hidden");
          el.codeTabs.classList.remove("flex");
          el.codeTabs.innerHTML = "";
          return;
        }

        el.codeTabs.classList.remove("hidden");
        el.codeTabs.classList.add("flex");
        el.codeTabs.innerHTML = examples
          .map(
            (example, index) => `
        <button
          class="rounded-full px-3 py-1.5 text-xs font-extrabold transition ${index === state.codeExampleIndex ? "bg-sky-500 text-white" : "bg-white/10 text-slate-300 hover:bg-white/20"}"
          type="button"
          data-code-tab="${index}"
        >
          ${example.title}
        </button>
      `,
          )
          .join("");
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function highlightCode(rawCode) {
        let html = escapeHtml(rawCode);
        const tokens = [];
        const tokenName = (index) => {
          let name = "";
          let value = index;
          do {
            name = String.fromCharCode(65 + (value % 26)) + name;
            value = Math.floor(value / 26) - 1;
          } while (value >= 0);
          return `@@CODETOKEN_${name}@@`;
        };
        const storeToken = (type, value) => {
          const key = tokenName(tokens.length);
          tokens.push({ key, type, value });
          return key;
        };

        html = html.replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, (match) =>
          storeToken("comment", match),
        );
        html = html.replace(/(".*?"|'.*?'|`.*?`)/g, (match) =>
          storeToken("string", match),
        );
        html = html.replace(
          /\b(const|let|var|function|return|import|from|export|default|module|theme|extend|colors|borderRadius|className|class|style)\b/g,
          '<span class="code-token-keyword">$1</span>',
        );
        html = html.replace(
          /\b(\d+(?:\.\d+)?)(px|rem|%|vh|vw)?\b/g,
          '<span class="code-token-number">$1$2</span>',
        );
        html = html.replace(
          /(&lt;\/?)([a-zA-Z][\w:-]*)/g,
          '$1<span class="code-token-tag">$2</span>',
        );
        html = html.replace(
          /\s([a-zA-Z_:][-a-zA-Z0-9_:.]*)(=)/g,
          ' <span class="code-token-attr">$1</span>$2',
        );

        tokens.forEach(({ key, type, value }) => {
          html = html.replaceAll(
            key,
            `<span class="code-token-${type}">${value}</span>`,
          );
        });

        return html;
      }

      function renderSlide() {
        const slide = slides[state.index];
        el.kicker.textContent = slide.category || "Tailwind CSS";
        el.count.textContent = `${state.index + 1} / ${slides.length}`;
        el.title.textContent = slide.title;
        el.lead.textContent = slide.lead;
        el.bullets.innerHTML = slide.bullets
          .map(
            (item) =>
              `<li class="flex gap-3"><span class="mt-2.5 h-2.5 w-2.5 shrink-0 rounded-full bg-sky-500"></span><span>${item}</span></li>`,
          )
          .join("");
        if (slide.speakerNotes) {
          el.speakerNotes.classList.remove("hidden");
          el.speakerNotes.textContent = slide.speakerNotes;
        } else {
          el.speakerNotes.classList.add("hidden");
          el.speakerNotes.textContent = "";
        }
        el.visual.innerHTML = visualTemplate(slide.visual);
        el.prevBtn.disabled = state.index === 0;
        el.nextBtn.disabled = state.index === slides.length - 1;

        const examples = getCodeExamples(slide);
        const example = getCurrentCodeExample();
        renderCodeTabs(examples);

        if (example) {
          el.codeWrap.classList.remove("hidden");
          el.copyBtn.classList.remove("hidden");
          el.codeLabel.textContent =
            example.language || example.title || "Code";
          el.code.innerHTML = highlightCode(example.code);
        } else {
          el.codeWrap.classList.add("hidden");
          el.copyBtn.classList.add("hidden");
          el.code.innerHTML = "";
        }

        renderDots();
      }

      function goTo(index) {
        state.index = Math.max(0, Math.min(slides.length - 1, index));
        state.codeExampleIndex = 0;
        renderSlide();
      }

      function openLightbox() {
        const example = getCurrentCodeExample();
        if (!example) return;
        el.lightboxTitle.textContent =
          example.title || example.language || slides[state.index].title;
        el.lightboxCode.innerHTML = highlightCode(example.code);
        el.lightbox.classList.remove("hidden");
        el.lightbox.classList.add("flex");
        document.body.classList.add("overflow-hidden");
        el.closeLightboxBtn.focus();
      }

      function closeLightbox() {
        el.lightbox.classList.add("hidden");
        el.lightbox.classList.remove("flex");
        document.body.classList.remove("overflow-hidden");
        el.openCodeBtn.focus();
      }

      async function copyCurrentCode(button) {
        const example = getCurrentCodeExample();
        if (!example) return;
        await navigator.clipboard.writeText(example.code);
        const oldText = button.textContent;
        button.textContent = "Copied";
        setTimeout(() => {
          button.textContent = oldText;
        }, 900);
      }

      el.prevBtn.addEventListener("click", () => goTo(state.index - 1));
      el.nextBtn.addEventListener("click", () => goTo(state.index + 1));
      el.codeTabs.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-code-tab]");
        if (!tab) return;
        state.codeExampleIndex = Number(tab.dataset.codeTab);
        renderSlide();
      });
      el.openCodeBtn.addEventListener("click", openLightbox);
      el.codePreviewBtn.addEventListener("click", openLightbox);
      el.closeLightboxBtn.addEventListener("click", closeLightbox);
      el.copyBtn.addEventListener("click", () => copyCurrentCode(el.copyBtn));
      el.lightboxCopyBtn.addEventListener("click", () =>
        copyCurrentCode(el.lightboxCopyBtn),
      );
      el.lightbox.addEventListener("click", (event) => {
        if (event.target === el.lightbox) closeLightbox();
      });

      window.addEventListener("keydown", (event) => {
        if (!el.lightbox.classList.contains("hidden")) {
          if (event.key === "Escape") closeLightbox();
          return;
        }
        if (event.key === "ArrowRight") goTo(state.index + 1);
        if (event.key === "ArrowLeft") goTo(state.index - 1);
      });

      renderSlide();
    </script>
