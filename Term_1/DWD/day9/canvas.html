<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/digitallytailored/classless@latest/classless.min.css"
    />

    <title>Canvas Demo</title>

    <style>
      #myCanvas {
        border: 1px solid #333;
        border-radius: 12px;
        background-color: #f1f5f9;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: start;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Canvas Demo</h2>
    <div class="container">
      <canvas id="myCanvas" width="500" height="500"></canvas>

      <div class="controls">
        <button onclick="drawLine(0, 0, 500, 500)">Draw Line</button>
        <button onclick="drawCircle(250, 250, 100)">Draw Circle</button>
        <button onclick="addImage('./Long.png')">Add Image</button>
        <button onclick="resetCanvas()">Reset Canvas</button>
      </div>
    </div>
    <script>
      function drawLine(x1, y1, x2, y2) {
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      function drawCircle(x, y, radius) {
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, 2 * Math.PI);
        ctx.stroke();
      }

      function resetCanvas() {
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function addImage(image) {
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.src = image;
        img.onload = function () {
          ctx.drawImage(img, 0, 0);
        };
      }
    </script>
  </body>
</html>
