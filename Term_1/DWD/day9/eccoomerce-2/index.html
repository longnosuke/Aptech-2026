<!DOCTYPE html> <html lang="vi"> <head>   <meta charset="UTF-8" />   <meta name="viewport" content="width=device-width, initial-scale=1.0" />   <title>Simple E-commerce</title>   <link rel="stylesheet" href="style.css" /> </head> <body>   <header class="header">     <h1>Simple Shop</h1>      <nav>       <a href="index.html">Home</a>       <a href="cart.html">         Cart <span id="cartCount">0</span>       </a>     </nav>   </header>    <main class="container">     <section class="auth-box">       <h2>Account</h2>        <form id="loginForm">         <input           type="text"           id="username"           placeholder="Username"           autocomplete="username"         />          <input           type="password"           id="password"           placeholder="Password"           autocomplete="current-password"         />          <label class="remember">           <input type="checkbox" id="rememberMe" />           Remember me         </label>          <button type="submit">SIGN IN</button>       </form>        <div id="userPanel" class="hidden">         <p>           Signed in as:           <strong id="signedInUser"></strong>         </p>          <button id="signOutBtn">SIGN OUT</button>       </div>        <p id="loginMessage"></p>        <div class="demo-account">         <p><strong>Demo account:</strong></p>         <p>Username: <code>admin</code></p>         <p>Password: <code>123456</code></p>       </div>     </section>      <section>       <h2>Product List</h2>        <p id="cartMessage"></p>        <div id="productList" class="product-list"></div>     </section>   </main>    <script src="script.js"></script> </body> </html>
