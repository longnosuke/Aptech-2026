<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopApp — DWD Term 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>

    <style>
      /* ============================================================
       DESIGN SYSTEM — Long
    ============================================================ */
      :root {
        --bg: #0d0d0d;
        --surface: #161616;
        --surface2: #1f1f1f;
        --border: #2a2a2a;
        --text: #f0ede8;
        --muted: #888;
        --accent: #e8c547;
        --accent2: #e07b39;
        --danger: #e05252;
        --success: #52c97a;

        --font-head: "Syne", sans-serif;
        --font-body: "DM Sans", sans-serif;

        --r: 10px;
        --r-lg: 16px;
        --sh: 0 4px 24px rgba(0, 0, 0, 0.5);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* --- Page switching --- */
      .page {
        display: none;
      }
      .page.active {
        display: block;
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ============================================================
       NAVBAR
    ============================================================ */
      #navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        height: 64px;
        background: rgba(13, 13, 13, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
      #nav-logo {
        font-family: var(--font-head);
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      #nav-logo span {
        color: var(--text);
      }

      #nav-links {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #nav-links button {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-family: var(--font-body);
        font-size: 0.9rem;
        padding: 8px 16px;
        border-radius: var(--r);
        transition: all 0.18s;
        position: relative;
      }
      #nav-links button:hover {
        color: var(--text);
        background: var(--surface2);
      }

      #cart-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        color: var(--bg);
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 6px;
        vertical-align: middle;
        transition: transform 0.2s;
      }
      #cart-badge.pop {
        transform: scale(1.35);
      }

      #nav-user {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #nav-username {
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }
      #btn-signout {
        padding: 7px 16px;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: var(--r);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.82rem;
        transition: all 0.18s;
      }
      #btn-signout:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ============================================================
       AUTH PAGES (Sign In / Sign Up)
    ============================================================ */
      .auth-page {
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-box {
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 48px 40px;
      }
      .auth-box h2 {
        font-family: var(--font-head);
        font-size: 1.9rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 4px;
      }
      .auth-box .auth-sub {
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 18px;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 7px;
        letter-spacing: 0.05em;
      }
      .form-group input[type="text"],
      .form-group input[type="password"] {
        width: 100%;
        padding: 12px 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.18s;
      }
      .password-field {
        position: relative;
      }
      .password-field input {
        padding-right: 48px;
      }
      .btn-password-toggle {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        border-radius: 6px;
      }
      .btn-password-toggle:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-password-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .btn-password-toggle .eye-off {
        display: none;
      }
      .btn-password-toggle.showing .eye-on {
        display: none;
      }
      .btn-password-toggle.showing .eye-off {
        display: block;
      }
      .form-group input:focus {
        border-color: var(--accent);
      }

      .remember-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        cursor: pointer;
      }
      .remember-row input[type="checkbox"] {
        accent-color: var(--accent);
        width: 16px;
        height: 16px;
      }
      .remember-row span {
        font-size: 0.88rem;
        color: var(--muted);
      }
      .btn-primary {
        width: 100%;
        padding: 13px;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: var(--r);
        font-family: var(--font-head);
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition:
          opacity 0.18s,
          transform 0.12s;
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }

      .auth-switch {
        margin-top: 22px;
        text-align: center;
        font-size: 0.86rem;
        color: var(--muted);
      }
      .auth-switch button {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--accent);
        font-family: var(--font-body);
        font-size: 0.86rem;
        padding: 0;
        text-decoration: underline;
      }

      .error-msg {
        background: rgba(224, 82, 82, 0.12);
        border: 1px solid rgba(224, 82, 82, 0.3);
        color: var(--danger);
        border-radius: var(--r);
        padding: 10px 14px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        display: none;
      }
      .error-msg.show {
        display: block;
      }

      /* ============================================================
       HOME — PRODUCT GRID
    ============================================================ */
      .page-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 48px 32px;
      }
      .page-header {
        margin-bottom: 36px;
      }
      .page-header h1 {
        font-family: var(--font-head);
        font-size: 2.4rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }
      .page-header p {
        color: var(--muted);
        margin-top: 6px;
        font-size: 0.95rem;
      }

      #product-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 24px;
      }

      .product-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        display: flex;
        flex-direction: column;
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--sh);
      }

      .product-card .card-img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
        background: var(--surface2);
      }
      .card-img-placeholder {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, var(--surface2) 0%, #222 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;

        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
      }

      .product-card .card-body {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .card-category {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        background: rgba(232, 197, 71, 0.1);
        padding: 3px 9px;
        border-radius: 20px;
        display: inline-block;
        margin: 10px 0;
        width: fit-content;
      }
      .card-name {
        font-family: var(--font-head);
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .card-desc {
        font-size: 0.83rem;
        color: var(--muted);
        line-height: 1.5;
        flex: 1;
      }
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 16px;
      }
      .card-price {
        font-family: var(--font-head);
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--accent);
      }
      .btn-add {
        padding: 8px 18px;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: var(--r);
        font-family: var(--font-head);
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.18s;
      }
      .btn-add:hover {
        opacity: 0.85;
      }
      .btn-add.added {
        background: var(--success);
        color: #fff;
      }

      /* ============================================================
       CART PAGE
    ============================================================ */
      #cart-list {
        margin-bottom: 32px;
      }

      .cart-empty {
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);
      }
      .cart-empty .empty-icon {
        font-size: 3rem;
        margin-bottom: 16px;
      }
      .cart-empty h3 {
        font-family: var(--font-head);
        font-size: 1.4rem;
        color: var(--text);
        margin-bottom: 8px;
      }

      .cart-item {
        display: flex;
        align-items: center;
        gap: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px 24px;
        margin-bottom: 12px;
        transition: border-color 0.18s;
      }
      .cart-item:hover {
        border-color: #3a3a3a;
      }

      .cart-item-emoji {
        font-size: 2rem;
        flex-shrink: 0;
      }

      .cart-item-info {
        flex: 1;
      }
      .cart-item-name {
        font-family: var(--font-head);
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .cart-item-price {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .qty-controls {
        display: flex;
        align-items: center;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
      }
      .qty-btn {
        width: 36px;
        height: 36px;
        background: var(--surface2);
        border: none;
        color: var(--text);
        cursor: pointer;
        font-size: 1.1rem;
        transition: background 0.15s;
      }
      .qty-btn:hover {
        background: var(--border);
      }
      .qty-num {
        width: 44px;
        text-align: center;
        font-family: var(--font-head);
        font-weight: 700;
        font-size: 0.95rem;
        border: none;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        padding: 0;
        line-height: 36px;
        display: block;
      }

      .cart-item-subtotal {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: 1rem;
        min-width: 90px;
        text-align: right;
        color: var(--accent);
      }

      .btn-remove {
        background: none;
        border: 1px solid transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 6px 8px;
        border-radius: var(--r);
        transition: all 0.18s;
      }
      .btn-remove:hover {
        color: var(--danger);
        border-color: var(--danger);
      }

      .cart-summary {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 28px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 20px;
      }
      .cart-total-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 4px;
      }
      #cart-total {
        font-family: var(--font-head);
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--accent);
      }
      .cart-actions {
        display: flex;
        gap: 12px;
      }

      .btn-clear {
        padding: 12px 24px;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: var(--r);
        font-family: var(--font-body);
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.18s;
      }
      .btn-clear:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .btn-checkout {
        padding: 12px 28px;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: var(--r);
        font-family: var(--font-head);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.18s;
      }
      .btn-checkout:hover {
        opacity: 0.85;
      }

      /* ============================================================
       TOAST
    ============================================================ */
      #toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 14px 22px;
        border-radius: var(--r);
        box-shadow: var(--sh);
        font-size: 0.9rem;
        font-family: var(--font-body);
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.25s,
          transform 0.25s;
        pointer-events: none;
        z-index: 999;
      }
      #toast.show {
        opacity: 1;
        transform: none;
      }

      /* ============================================================
       RESPONSIVE
    ============================================================ */
      @media (max-width: 960px) {
        #navbar {
          padding: 0 20px;
        }
        .page-inner {
          padding: 36px 20px;
        }
        .page-header h1 {
          font-size: 2rem;
        }
        #product-list {
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 18px;
        }
      }

      @media (max-width: 640px) {
        #navbar {
          height: auto;
          min-height: 64px;
          padding: 10px 16px;
          gap: 10px;
          flex-wrap: wrap;
        }
        #nav-links {
          order: 3;
          width: 100%;
          justify-content: space-between;
        }
        #nav-links button {
          flex: 1;
          text-align: center;
          padding: 9px 10px;
        }
        #nav-user {
          margin-left: auto;
        }
        #nav-username {
          max-width: 120px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .auth-page {
          min-height: calc(100vh - 84px);
        }
        .auth-box {
          padding: 28px 20px;
          margin: 16px;
        }
        .auth-box h2 {
          font-size: 1.6rem;
        }

        .page-inner {
          padding: 28px 16px;
        }
        .page-header {
          margin-bottom: 24px;
        }
        .page-header h1 {
          font-size: 1.7rem;
        }

        #product-list {
          grid-template-columns: 1fr;
          gap: 14px;
        }
        .product-card .card-img,
        .card-img-placeholder {
          height: 200px;
        }

        .cart-item {
          flex-wrap: wrap;
          align-items: flex-start;
          padding: 16px;
          gap: 14px;
        }
        .cart-item-info {
          min-width: 0;
          width: calc(100% - 56px);
        }
        .cart-item-subtotal {
          min-width: 0;
          text-align: left;
        }

        .cart-summary {
          flex-direction: column;
          align-items: stretch;
          padding: 20px;
        }
        .cart-actions {
          width: 100%;
        }
        .btn-clear,
        .btn-checkout {
          flex: 1;
          padding: 12px 10px;
        }

        #toast {
          right: 16px;
          left: 16px;
          bottom: 16px;
          width: auto;
        }
      }

      @media (max-width: 420px) {
        #navbar {
          padding: 10px 12px;
        }
        .page-inner {
          padding: 22px 12px;
        }
        .auth-box {
          margin: 12px;
          padding: 24px 16px;
        }
        .card-footer {
          gap: 10px;
        }
        .btn-add {
          padding: 8px 12px;
        }
        #cart-total {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav id="navbar">
      <div id="nav-logo">SHOP<span>APP</span></div>

      <div id="nav-links">
        <button onclick="routeTo('home')">Trang chủ</button>
        <button onclick="routeTo('cart')">
          Giỏ hàng <span id="cart-badge">0</span>
        </button>
      </div>

      <div id="nav-user">
        <span id="nav-username"></span>
        <button id="btn-signout" onclick="signOut()" style="display: none">
          Đăng xuất
        </button>
      </div>
    </nav>

    <!-- TRANG: SIGN IN -->
    <section id="page-signin" class="page">
      <div class="auth-page">
        <div class="auth-box">
          <h2>Đăng nhập</h2>
          <p class="auth-sub">Chào mừng trở lại — nhập thông tin của bạn</p>

          <div id="signin-error" class="error-msg"></div>

          <div class="form-group">
            <label for="signin-username">Tên đăng nhập</label>
            <input
              type="text"
              id="signin-username"
              placeholder="username"
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <label for="signin-password">Mật khẩu</label>
            <div class="password-field">
              <input
                type="password"
                id="signin-password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="btn-password-toggle"
                aria-label="Hiển thị mật khẩu"
                onclick="togglePasswordBtn(this, 'signin-password')"
              >
                <svg class="eye-on" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"
                  ></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18"></path>
                  <path
                    d="M10.7 5.1A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.1 3.8"
                  ></path>
                  <path
                    d="M6.6 6.6C3.8 8.3 2 12 2 12s3.5 7 10 7c1.9 0 3.6-.5 5-1.2"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <label class="remember-row">
            <input type="checkbox" id="signin-remember" />
            <span>Ghi nhớ đăng nhập</span>
          </label>

          <button class="btn-primary" onclick="handleSignIn()">
            Đăng nhập
          </button>

          <p class="auth-switch">
            Chưa có tài khoản?
            <button onclick="routeTo('signup')">Đăng ký ngay</button>
          </p>
        </div>
      </div>
    </section>

    <!-- TRANG: SIGN UP -->
    <section id="page-signup" class="page">
      <div class="auth-page">
        <div class="auth-box">
          <h2>Đăng ký</h2>
          <p class="auth-sub">Tạo tài khoản mới — miễn phí, nhanh chóng</p>

          <div id="signup-error" class="error-msg"></div>

          <div class="form-group">
            <label for="signup-username">Tên đăng nhập</label>
            <input type="text" id="signup-username" placeholder="username" />
          </div>
          <div class="form-group">
            <label for="signup-password">Mật khẩu</label>
            <div class="password-field">
              <input
                type="password"
                id="signup-password"

      /* ============================================================
         STATE
      ============================================================ */
      let currentUser = null;

      /* ============================================================
         ZONE 1 — DATA / ROUTING / AUTH GUARD (Member A)
      ============================================================ */
      function restoreAuth() {
        const raw =
          sessionStorage.getItem(AUTH_KEY) || localStorage.getItem(AUTH_KEY);
        if (raw) {
          try {
            currentUser = JSON.parse(raw);
          } catch {
            currentUser = null;
          }
        }
        syncUserChip();
        routeTo(normalizeRoute());
      }

      function normalizeRoute() {
        return currentUser ? "home" : "signin";
      }

      function routeTo(page) {
        // Auth guard
        const protectedPages = ["home", "cart"];
        const authOnlyPages = ["signin", "signup"];

        if (!currentUser && protectedPages.includes(page)) {
          page = "signin";
        }
        if (currentUser && authOnlyPages.includes(page)) {
          page = "home";
        }

        // Ẩn tất cả trang
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));

        // Hiện đúng trang
        const target = document.getElementById("page-" + page);
        if (target) target.classList.add("active");

        // Render trang nếu cần
        if (page === "home") renderProducts();
        if (page === "cart") renderCart();
      }

      /* ============================================================
         ZONE 2 — AUTH (Member B)
      ============================================================ */
      function signIn(username, password, remember) {
        const user = USERS.find(
          (u) => u.username === username && u.password === password,
        );
        if (!user) {
          const errEl = document.getElementById("signin-error");
          if (errEl) {
            errEl.textContent = "Tên đăng nhập hoặc mật khẩu không đúng.";
            errEl.classList.add("show");
          }
          return false;
        }
        currentUser = { username: user.username };
        const payload = JSON.stringify(currentUser);
        if (remember) {
          localStorage.setItem(AUTH_KEY, payload);
        } else {
          sessionStorage.setItem(AUTH_KEY, payload);
        }
        syncUserChip();
        routeTo("home");
        return true;
      }

      function signUp(username, password, confirmPassword) {
        const errEl = document.getElementById("signup-error");
        const showErr = (msg) => {
          if (errEl) {
            errEl.textContent = msg;
            errEl.classList.add("show");
          }
          return false;
        };

        if (!username || username.trim().length < 1)
          return showErr("Tên đăng nhập không được để trống.");
        if (!password || password.length < 6)
          return showErr("Mật khẩu phải có ít nhất 6 ký tự.");
        if (password !== confirmPassword)
          return showErr("Mật khẩu xác nhận không khớp.");
        if (USERS.find((u) => u.username === username))
          return showErr("Tên đăng nhập đã tồn tại.");

        USERS.push({ username, password });
        signIn(username, password, false);
        return true;
      }

      function signOut() {
        currentUser = null;
        sessionStorage.removeItem(AUTH_KEY);
        localStorage.removeItem(AUTH_KEY);
        syncUserChip();
        routeTo("signin");
      }

      function syncUserChip() {
        const chip = document.getElementById("nav-username");
        const btn = document.getElementById("btn-signout");
        if (!chip || !btn) return;
        if (currentUser) {
          chip.textContent = currentUser.username;
          btn.style.display = "inline-block";
        } else {
          chip.textContent = "";
          btn.style.display = "none";
        }
      }

      /* Form handlers (tách ra để không pass DOM event vào signIn) */
      function handleSignIn() {
        const username = document
          .getElementById("signin-username")
          .value.trim();
        const password = document.getElementById("signin-password").value;
        const remember = document.getElementById("signin-remember").checked;
        const errEl = document.getElementById("signin-error");
        if (errEl) errEl.classList.remove("show");
        signIn(username, password, remember);
      }

      function handleSignUp() {
        const username = document
          .getElementById("signup-username")
          .value.trim();
        const password = document.getElementById("signup-password").value;
        const confirm = document.getElementById("signup-confirm").value;
        const errEl = document.getElementById("signup-error");
        if (errEl) errEl.classList.remove("show");
        signUp(username, password, confirm);
      }

      /* ============================================================
         ZONE 3 — PRODUCTS (Member C)
      ============================================================ */
      function renderProducts() {
        const container = document.getElementById("product-list");
        if (!container) return;

        container.innerHTML = PRODUCTS.map(
          (p) => `
          <div class="product-card" data-id="${p.id}">
            <div class="card-img-placeholder">
              <img src="${p.image}" alt="${p.name}" />
              </div>
            <div class="card-body">
              <span class="card-category">${p.category}</span>
              <div class="card-name">${p.name}</div>
              <div class="card-desc">${p.desc}</div>
              <div class="card-footer">
                <span class="card-price">${p.price.toLocaleString("vi-VN")}đ</span>
                <button class="btn-add" onclick="addToCart(${p.id})" id="add-btn-${p.id}">
                  + Thêm
                </button>
              </div>
            </div>
          </div>
        `,
        ).join("");
      }

      function addToCart(productId) {
        const cart = getCart();
        const existing = cart.find((item) => item.id === productId);

        if (existing) {
          existing.quantity += 1;
        } else {
          const product = PRODUCTS.find((p) => p.id === productId);
          if (!product) return;
          cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            desc: product.desc,
            category: product.category,
            image: product.image,
            emoji: product.emoji || "🛍️",
            quantity: 1,
          });
        }

        saveCart(cart);
        updateCartBadge();

        // // Visual feedback trên nút
        // const btn = document.getElementById("add-btn-" + productId);
        // if (btn) {
        //   btn.textContent = "✓ Đã thêm";
        //   btn.classList.add("added");
        //   setTimeout(() => {
        //     btn.textContent = "+ Thêm";
        //     btn.classList.remove("added");
        //   }, 1200);
        // }

        showToast(
          `Đã thêm "${PRODUCTS.find((p) => p.id === productId)?.name}" vào giỏ`,
        );
      }

      /* ============================================================
         ZONE 4 — CART (Member D)
      ============================================================ */
      function getCart() {
        const raw = sessionStorage.getItem(CART_KEY);
        if (!raw) return [];
        try {
          return JSON.parse(raw);
        } catch {
          return [];
        }
      }

      function saveCart(cart) {
        sessionStorage.setItem(CART_KEY, JSON.stringify(cart));
      }

      function renderCart() {
        const container = document.getElementById("cart-list");
        const totalEl = document.getElementById("cart-total");
        if (!container) return;

        const cart = getCart();

        if (cart.length === 0) {
          container.innerHTML = `
            <div class="cart-empty">
              <div class="empty-icon">🛒</div>
              <h3>Giỏ hàng trống</h3>
              <p>Hãy thêm sản phẩm từ trang chủ nhé!</p>
            </div>`;
          if (totalEl) totalEl.textContent = "0đ";
          return;
        }

        container.innerHTML = cart
          .map(
            (item) => `
          <div class="cart-item" data-id="${item.id}">
            <div class="cart-item-emoji">${item.emoji || "🛍️"}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${item.price.toLocaleString("vi-VN")}đ / cái</div>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
              <span class="qty-num">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity(${item.id}, +1)">+</button>
            </div>
            <div class="cart-item-subtotal">
              ${(item.price * item.quantity).toLocaleString("vi-VN")}đ
            </div>
            <button class="btn-remove" onclick="removeFromCart(${item.id})" title="Xóa">✕</button>
          </div>
        `,
          )
          .join("");

        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );
        if (totalEl) totalEl.textContent = total.toLocaleString("vi-VN") + "đ";
      }

      function updateQuantity(productId, delta) {
        const cart = getCart();
        const item = cart.find((i) => i.id === productId);
        if (!item) return;

        item.quantity += delta;
        if (item.quantity <= 0) {
          removeFromCart(productId);
          return;
        }

        saveCart(cart);
        renderCart();
        updateCartBadge();
      }

      function removeFromCart(productId) {
        const cart = getCart().filter((i) => i.id !== productId);
        saveCart(cart);
        renderCart();
        updateCartBadge();
      }

      function clearCart() {
        saveCart([]);
        renderCart();
        updateCartBadge();
      }

      function updateCartBadge() {
        const badge = document.getElementById("cart-badge");
        if (!badge) return;
        const total = getCart().reduce((sum, i) => sum + i.quantity, 0);
        badge.textContent = String(total);
        // Pop animation
        badge.classList.remove("pop");
        void badge.offsetWidth;
        badge.classList.add("pop");
        setTimeout(() => badge.classList.remove("pop"), 200);
      }

      /* ============================================================
         EXTRAS
      ============================================================ */
      function checkout() {
        if (getCart().length === 0) {
          showToast("Giỏ hàng đang trống!");
          return;
        }
        showToast("🎉 Đặt hàng thành công!");
        clearCart();
        confetti();
        setTimeout(clearCart, 1500);
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        if (!t) return;
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), 2500);
      }

      function togglePasswordBtn(button, inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const showing = input.type === "text";
        input.type = showing ? "password" : "text";
        button.classList.toggle("showing", !showing);
        button.setAttribute(
          "aria-label",
          showing ? "Hiển thị mật khẩu" : "Ẩn mật khẩu",
        );
      }

      ============================================================ */
