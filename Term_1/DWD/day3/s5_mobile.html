<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive with media tag</title>
  <style>
    div {
      color: red;
    }
    @media screen and (min-width: 600px) and (max-width: 800px) {
      div {
        color: blue;
      }
    }

    @media screen and (min-width: 800px) {
      div {
        color: green;
      }
  }
  </style>
</head>
<body>
  <div>This is a dummy test</div>
</body>
</html>
