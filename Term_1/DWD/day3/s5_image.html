<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S5 Image</title>

  <style>
    figure {
      text-align: center;
      border: 10px solid red;
      box-shadow: 10px 10px 10px black;
    }

    figcaption {
      text-align: center;
      color: red;
      font-weight: bold;
    }

    img {
      padding: 20px;
    }
  </style>
</head>
<body>
  <h2>Image</h2>
  <img src="https://yavuzceliker.github.io/sample-images/image-1.jpg" alt="Image 1" width="200" height="300">
  <img src="https://yavuzceliker.github.io/sample-images/image-3.jpg" alt="Image 1" width="200" height="300">
  <img src="https://yavuzceliker.github.io/sample-images/image-5.jpg" alt="Image 1" width="200" height="300">
  <img src="https://yavuzceliker.github.io/sample-images/image-6.jpg" alt="Image 1" width="200" height="300">

  <h2>Figure</h2>
  <figure>
    <img src="https://yavuzceliker.github.io/sample-images/image-1.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-3.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-5.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-6.jpg" alt="Image 1" width="200" height="300">
  </figure>

  <h2>Fig Caption</h2>
  <figure>
    <img src="https://yavuzceliker.github.io/sample-images/image-1.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-3.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-5.jpg" alt="Image 1" width="200" height="300">
    <img src="https://yavuzceliker.github.io/sample-images/image-6.jpg" alt="Image 1" width="200" height="300">
    <figcaption>Images</figcaption>
  </figure>
</body>
</html>
