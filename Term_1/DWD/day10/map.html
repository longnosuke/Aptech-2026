<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/digitallytailored/classless@latest/classless.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <title>Find Map Location</title>

    <style>
      #map {
        height: 600px;
      }
    </style>
  </head>
  <body>
    <h2>Geolocation Demo - Version 2</h2>
    <p id="demo">Getting your location...</p>
    <button onclick="getLocation()">Lấy vị trí hiện tại</button>
    <form action="" id="find-address-form">
      <input type="text" id="address" />
    </form>

    <p id="info"></p>
    <div id="map"></div>
    <script>
      function getLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(showPosition);
        } else {
          document.getElementById("demo").innerHTML =
            "Geolocation is not supported by this browser.";
        }
      }

      function initMap(lat, lng) {
        map = L.map("map").setView([lat, lng], 13);
      }

      function setPosition(lat, lng) {
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);

        L.marker([lat, lng]).addTo(map).bindPopup("You are here").openPopup();
      }

      function showPosition(position) {
        document.getElementById("demo").innerHTML =
          "Latitude: " +
          position.coords.latitude +
          "<br>Longitude: " +
          position.coords.longitude;

        initMap(position.coords.latitude, position.coords.longitude);
        setPosition(position.coords.latitude, position.coords.longitude);
      }

      function findLocation(address) {
        fetch(
          `https://nominatim.openstreetmap.org/search?q=${address}&format=json`,
        )
          .then((res) => res.json())
          .then((data) => {
            if (data.length === 0) {
              document.getElementById("info").innerHTML =
                "Không tìm thấy địa chỉ";
              return;
            }
            initMap(data[0].lat, data[0].lon);
            setPosition(data[0].lat, data[0].lon);
          });
        // initMap(data[0].lat, data[0].lon);
        // setPosition(data[0].lat, data[0].lon);
      }

      document
        .getElementById("find-address-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const address = document.getElementById("address").value;
          findLocation(address);
        });
    </script>
  </body>
</html>
