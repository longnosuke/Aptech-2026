<!DOCTYPE html>
<html>
<head>
  <title>Pattern Test</title>
  <style>
    .valid {
      color: green;
    }
    .invalid {
      color: red;
    }
  </style>
</head>
<body>
  <h2>Email with validation</h2>
  <form>
    <label for="emailInput">Email:</label>
    <!-- Example that fits the pattern
      user12@example.com
      john.doe@abc.net
      jane.smith@xyz.org
      test123@gmail.com
      example.user@edu.gov
    -->
    <input
      type="mail"
      pattern="[A-Za-z0-9]{2,10}@[a-z0-9]{2,6}\.(com|net|org|edu|gov)(\.[a-z]{2,4})?"
      title="Enter a valid email address with the following pattern: [A-Za-z0-9]{2,10}@ [a-z0-9]{2,6} .(com|net|org|edu|gov) (.[a-z]{2,4})?"
      id="emailInput"
    />
    <button type="submit">Submit</button>
  </form>

  </script>
</body>
</html>
